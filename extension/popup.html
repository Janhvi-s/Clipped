<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clipped</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
        <rect x="5" y="7" width="22" height="22" rx="3" fill="#6366f1" fill-opacity=".15" stroke="#6366f1" stroke-width="1.6"/>
        <rect x="5" y="5.5" width="22" height="3" rx="1.5" fill="#6366f1" fill-opacity=".25" stroke="#6366f1" stroke-width="1.2"/>
        <circle cx="10" cy="7" r="1.4" fill="#6366f1" fill-opacity=".6"/>
        <circle cx="16" cy="7" r="1.4" fill="#6366f1" fill-opacity=".6"/>
        <circle cx="22" cy="7" r="1.4" fill="#6366f1" fill-opacity=".6"/>
        <line x1="9" y1="15" x2="23" y2="15" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="9" y1="19.5" x2="23" y2="19.5" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="9" y1="24" x2="17" y2="24" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="20" y1="24.5" x2="25" y2="19.5" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Clipped
    </div>
    <a href="options.html" target="_blank" class="settings-link" title="Settings">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </a>
  </div>

  <div class="divider"></div>

  <div class="body">

    <!-- ── Active session ── -->
    <div id="view-active" class="hidden">
      <div class="view-label">Session active</div>
      <div id="session-pill" class="session-pill">
        <span class="session-dot"></span>
        <span id="pill-topic-name">—</span>
      </div>
      <p class="hint-text">Highlights on any page clip instantly to this topic — no AI, no dropdowns.</p>
      <button id="end-btn" class="btn-end">End Session</button>
    </div>

    <!-- ── Setup ── -->
    <div id="view-setup">
      <div class="view-label">Start a session</div>
      <p class="hint-text">Lock a topic so every clip goes there instantly — no AI, no dropdowns.</p>

      <div class="field">
        <label for="topic-input">Topic name</label>
        <div class="select-row">
          <input
            id="topic-input"
            type="text"
            placeholder="e.g. Agentic AI, React, System Design…"
            autocomplete="off"
            list="topic-suggestions"
          />
          <button id="retry-btn" class="btn-retry" title="Reload suggestions">↻</button>
        </div>
        <datalist id="topic-suggestions"></datalist>
        <p id="load-error" class="load-error hidden">
          Backend unreachable — suggestions unavailable, but you can still type a name.
        </p>
      </div>

      <button id="start-btn" class="btn-start" disabled>Start Session</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
